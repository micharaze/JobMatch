services:
  scraper:
    build:
      context: .
      dockerfile: services/scraper/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3001
      - DB_PATH=/app/data/scraper.db
      - LOG_LEVEL=info
    restart: unless-stopped

  normalizer:
    build:
      context: .
      dockerfile: services/normalizer/Dockerfile
    ports:
      - "3002:3002"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3002
      - DB_PATH=/app/data/scraper.db
      - LOG_LEVEL=info
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - GEMMA_BASE_URL=http://host.docker.internal:11434/v1
      - GEMMA_API_KEY=ollama
      - NORMALIZER_MODEL=${NORMALIZER_MODEL:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_KEEP_ALIVE=5m
      - PROCESS_INTERVAL_MS=0
    depends_on:
      - scraper
    restart: unless-stopped

  matcher:
    build:
      context: .
      dockerfile: services/matcher/Dockerfile
    ports:
      - "3004:3004"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3004
      - DB_PATH=/app/data/scraper.db
      - LOG_LEVEL=info
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - GEMMA_BASE_URL=http://host.docker.internal:11434/v1
      - GEMMA_API_KEY=ollama
      - MATCHER_MODEL=${MATCHER_MODEL:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_KEEP_ALIVE=5m
    depends_on:
      - normalizer
    restart: unless-stopped

  cv:
    build:
      context: .
      dockerfile: services/cv/Dockerfile
    ports:
      - "3007:3007"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3007
      - DB_PATH=/app/data/scraper.db
      - LOG_LEVEL=info
      - NORMALIZER_URL=http://normalizer:3002
    depends_on:
      - normalizer
    restart: unless-stopped
